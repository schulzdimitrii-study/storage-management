<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Styles and Defs -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Box Gradients -->
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
    
    <!-- Glow Filter for Docker Compose Boundary -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#38bdf8" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />

  <!-- Diagram Title -->
  <text x="400" y="50" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    ARQUITETURA DO SISTEMA
  </text>
  
  <text x="400" y="75" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Visualização do fluxo de dados e orquestração de contêineres
  </text>

  <!-- Docker Compose Boundary Label -->
  <text x="50" y="135" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#38bdf8" letter-spacing="1.5">
    ORQUESTRAÇÃO DOCKER COMPOSE
  </text>

  <!-- Docker Compose Boundary Box -->
  <rect x="40" y="145" width="720" height="315" rx="16" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="8,6" opacity="0.6" filter="url(#glow)" />

  <!-- ==================== BROWSER / USER (OUTSIDE DOCKER COMPOSE OR AT THE BORDER) ==================== -->
  <!-- Browser Box -->
  <rect x="70" y="220" width="160" height="90" rx="12" fill="url(#browserGrad)" filter="url(#dropShadow)" />
  <!-- Browser Chrome Header -->
  <rect x="70" y="220" width="160" height="20" rx="0" fill="#1e3a8a" style="border-top-left-radius: 12px; border-top-right-radius: 12px;" />
  <circle cx="85" cy="230" r="3" fill="#ef4444" />
  <circle cx="95" cy="230" r="3" fill="#f59e0b" />
  <circle cx="105" cy="230" r="3" fill="#10b981" />
  <!-- Browser Content -->
  <text x="150" y="265" font-family="'Outfit', 'Inter', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Navegador Web</text>
  <text x="150" y="285" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="500" fill="#93c5fd" text-anchor="middle">Cliente (SPA/UI)</text>

  <!-- ==================== FRONTEND CONTROLLER ==================== -->
  <!-- Frontend Container -->
  <rect x="310" y="220" width="180" height="90" rx="12" fill="url(#frontendGrad)" filter="url(#dropShadow)" />
  <text x="400" y="255" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Flask Frontend</text>
  <text x="400" y="275" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="500" fill="#a7f3d0" text-anchor="middle">storage_frontend</text>
  <text x="400" y="295" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#d1fae5" text-anchor="middle">Porta: 3000</text>

  <!-- ==================== BACKEND CONTROLLER ==================== -->
  <!-- Backend Container -->
  <rect x="560" y="220" width="180" height="90" rx="12" fill="url(#backendGrad)" filter="url(#dropShadow)" />
  <text x="650" y="255" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">FastAPI Backend</text>
  <text x="650" y="275" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="500" fill="#cffafe" text-anchor="middle">storage_backend</text>
  <text x="650" y="295" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#ecfeff" text-anchor="middle">Porta: 8000</text>

  <!-- ==================== DATABASE ==================== -->
  <!-- DB Container -->
  <rect x="560" y="355" width="180" height="85" rx="12" fill="url(#dbGrad)" filter="url(#dropShadow)" />
  <text x="650" y="385" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">PostgreSQL 16</text>
  <text x="650" y="405" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="500" fill="#c7d2fe" text-anchor="middle">storage_db</text>
  <text x="650" y="423" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="400" fill="#e0e7ff" text-anchor="middle">Porta: 5432</text>

  <!-- ==================== ARROWS / CONNECTORS ==================== -->
  <defs>
    <!-- Arrow Head Definition -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Browser <-> Frontend (Bidi HTTP) -->
  <path d="M 230 265 L 300 265" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-emerald)" />
  <text x="265" y="250" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">HTTP</text>
  <text x="265" y="280" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="400" fill="#94a3b8" text-anchor="middle">JSON/HTML</text>

  <!-- Frontend <-> Backend (Bidi REST) -->
  <path d="M 490 265 L 550 265" fill="none" stroke="#06b6d4" stroke-width="2.5" marker-end="url(#arrow-cyan)" />
  <text x="520" y="250" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">REST</text>
  <text x="520" y="280" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="400" fill="#94a3b8" text-anchor="middle">API Calls</text>

  <!-- Backend <-> Database (SQL Connection) -->
  <path d="M 650 310 L 650 345" fill="none" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="685" y="332" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">SQL</text>
</svg>
